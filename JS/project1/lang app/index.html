<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeLang Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>CodeLang Explorer</h1>

  <div id="languages">
    <button data-lang="c">C</button>
    <button data-lang="cpp">C++</button>
    <button data-lang="csharp">C#</button>
    <button data-lang="js">JavaScript</button>
  </div>

  <div id="info">
    <h2 id="title">Select a language</h2>
    <p id="description"></p>
    <ul id="features"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
